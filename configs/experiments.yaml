project:
  base_dir: "/storage/internal_02/sperrotta-data/datasets"
  processed_dir: "/storage/internal_02/sperrotta-data/datasets/processed"
  project_dir: "/home/sperrotta/ecg_autoencoder_project"

training:
  epochs: 100
  batch_size: 128
  learning_rate: 0.001

# Single source of truth: every unique model configuration to train,
# listed exactly once. Downstream comparisons (architecture, bottleneck
# sensitivity) are just different groupings/views of these same runs —
# no configuration is ever trained twice.
runs:
  - id: conv_random
    split: random
    architecture: conv1d
    bottleneck_channels: 64

  - id: conv_interpatient
    split: interpatient
    architecture: conv1d
    bottleneck_channels: 64

  - id: dense_interpatient
    split: interpatient
    architecture: dense
    latent_dim: 64

  - id: conv_bottleneck_16
    split: interpatient
    architecture: conv1d
    bottleneck_channels: 16

  - id: conv_bottleneck_32
    split: interpatient
    architecture: conv1d
    bottleneck_channels: 32

  - id: conv_bottleneck_128
    split: interpatient
    architecture: conv1d
    bottleneck_channels: 128

# Named views over the runs above, used only for reporting/plotting.
comparisons:
  architecture_comparison:
    description: "Dense vs Conv1D, same split (interpatient)"
    run_ids: [conv_interpatient, dense_interpatient]

  bottleneck_study:
    description: "Conv1D detection performance vs bottleneck width"
    run_ids: [conv_bottleneck_16, conv_bottleneck_32, conv_interpatient, conv_bottleneck_128]
    x_axis_values: [16, 32, 64, 128]   # aligned with run_ids order above